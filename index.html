<!DOCTYPE html>
<html>

<head>
    <title>Fruit Stand</title>
    <meta charset="UTF-8" author="Jarah Yashi R. Singh">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

    <form name="checkout_form" action="checkout.html" onsubmit="return validateForm()">
        <h2>B & J Fruit Stand</h2>

        <label for="shopper">Your Name:</label>
        <input type="text" name="shopper" id="shopper" required>

        <br><br>

        <h3>Fruits:</h3>

        <label for="appleAmount">Apple [ 7.00 each ]: </label>
        <input type="number" name="appleAmount" id="appleAmount" min = "0" required>

        <br><br>

        <label for="bananaAmount">Banana [ 3.00 each]: </label>
        <input type="number" name="bananaAmount" id="bananaAmount" min = "0" required>

        <br><br>

        <label for="paymentAmount">Payment Amount: </label>
        <input type="number" name="paymentAmount" id="paymentAmount" min = "0" required>

        <br><br>

        <button type="reset">RESET ORDER</button>

        <br><br>

        <button type="submit">PURCHASE</button>
    </form>
    <script src="index.js"></script>
</body>
</html>
